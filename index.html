<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>School Library System</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header>
  <h1>📚 School Library Management System</h1>
  <p class="sub">Simple digital system for managing books & borrowing</p>
</header>

<main>

  <!-- ADD BOOK -->
  <section class="card">
    <h2>Add New Book</h2>

    <div class="grid">
      <input type="text" id="subject" placeholder="Subject (Math, English)">
      <input type="text" id="publisher" placeholder="Publisher">
      <input type="text" id="classLevel" placeholder="Class (S1, S2...)">
      <input type="number" id="year" placeholder="Year Published">
      <input type="number" id="copies" placeholder="Copies">
    </div>

    <button onclick="addBook()">➕ Add Book</button>
  </section>

  <!-- SEARCH -->
  <section class="card">
    <h2>Search Book</h2>
    <input type="text" id="search" placeholder="Search by subject..." onkeyup="searchBook()">
  </section>

  <!-- BOOK TABLE -->
  <section class="card">
    <h2>📚 Book List</h2>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Subject</th>
            <th>Publisher</th>
            <th>Class</th>
            <th>Year</th>
            <th>Copies</th>
            <th>Available</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bookList"></tbody>
      </table>
    </div>
  </section>

  <!-- BORROW -->
  <section class="card">
    <h2>👨‍🎓 Issue Book</h2>

    <div class="grid">
      <input type="text" id="studentName" placeholder="Student Name">
      <input type="text" id="studentClass" placeholder="Student Class">
      <input type="number" id="bookId" placeholder="Book ID">
    </div>

    <button onclick="borrowBook()">📖 Issue Book</button>
  </section>

  <!-- BORROW RECORDS -->
  <section class="card">
    <h2>📄 Borrow Records</h2>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Class</th>
            <th>Subject</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="borrowList"></tbody>
      </table>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
